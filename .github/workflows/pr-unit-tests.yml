name: PR Unit Tests
on:
  pull_request:
    branches: ["dev", "main"]
    # 'opened' and 'synchronize' (new commits) are included by default 
    # when you use pull_request, but you can explicitly state them:
    types: [opened, synchronize, reopened]

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Run Unit Tests
        # Replace with your specific unit test task if different
        run: ./gradlew testDebugUnitTest
