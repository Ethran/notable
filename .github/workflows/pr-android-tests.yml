name: PR Android Tests

# 1. Global permissions: Strictly read-only
permissions:
  contents: read

on:
  pull_request:
    types: [labeled]

jobs:
  android-tests:
    if: github.event.label.name == 'run-android-tests'
    runs-on: macos-latest 

    # 2. Job-level permissions: Elevated just for this specific job
    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run Android Instrumentation Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          # 1. Switch to the Automated Test Device image (highly recommended for CI)
          target: aosp_atd 
          arch: arm64-v8a
          force-avd-creation: false
          # 2. Removed the incompatible '-gpu swiftshader_indirect' flag
          emulator-options: -no-window -no-snapshot-save -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: ./gradlew connectedDebugAndroidTest
          
      - name: Remove Label
        # Fork protection and continue-on-error are correctly configured
        if: always() && github.event.pull_request.head.repo.fork == false
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.removeLabel({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'run-android-tests'
            })
