name: PR Android Tests
permissions:
  contents: read
  issues: write
on:
  pull_request:
    # Only trigger this workflow when a label is added to the PR
    types: [labeled]

jobs:
  android-tests:
    # IMPORTANT: Only run if the label added is exactly 'run-android-tests'
    if: github.event.label.name == 'run-android-tests'
    
    # macOS runners usually have hardware acceleration (HAXM) enabled by default, 
    # which makes Android emulators run significantly faster than on Ubuntu.
    runs-on: macos-latest 

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Run Android Instrumentation Tests
        # Using a standard community action to handle emulator creation and caching
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          # Replace with your specific instrumentation test task
          script: ./gradlew connectedDebugAndroidTest
          
      - name: Remove Label (Optional)
        # Automatically removes the label after running so you can trigger it again later by re-adding it
        if: always() 
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.removeLabel({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'run-android-tests'
            })
